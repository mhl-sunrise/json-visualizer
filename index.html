<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="A fast, offline-capable JSON editor that visualizes JSON as an interactive node diagram." />

  <!-- Privacy: everything runs locally. This policy restricts every network
       connection to the same origin (connect-src 'self') and forbids loading
       from or sending to any third party. The app makes no requests at all,
       so JSON you paste never leaves your browser. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; manifest-src 'self'; worker-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'" />

  <title>JSON Diagram — Editor & Visualizer</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0d1117" id="themeColorMeta" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">◈</span>
      <div class="brand-text">
        <span class="brand-name">JSON Diagram</span>
        <span class="brand-sub">Editor &amp; Visualizer</span>
      </div>
    </div>

    <div class="topbar-right">
      <span id="status" class="status status--ok" role="status" aria-live="polite">
        <span class="status-dot"></span><span class="status-text">Valid</span>
      </span>

      <div class="sep" aria-hidden="true"></div>

      <div class="actions" id="actions" role="menu">
        <button id="sampleBtn" class="btn" role="menuitem" type="button">Sample</button>
        <button id="formatBtn" class="btn" role="menuitem" type="button">Format</button>
        <button id="clearBtn" class="btn" role="menuitem" type="button">Clear</button>
      </div>

      <button id="themeBtn" class="btn btn--icon" type="button" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon icon-moon" viewBox="0 0 24 24" width="17" height="17" fill="none"
          stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
        <svg class="icon icon-sun" viewBox="0 0 24 24" width="17" height="17" fill="none"
          stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </button>

      <button id="burger" class="btn btn--icon burger" type="button"
        aria-label="Open menu" aria-expanded="false" aria-controls="actions">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
          stroke-width="1.9" stroke-linecap="round" aria-hidden="true">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
    </div>
  </header>

  <nav class="mobile-tabs" role="tablist" aria-label="View">
    <button class="mtab is-active" data-pane="editor" role="tab" aria-selected="true" type="button">JSON</button>
    <button class="mtab" data-pane="graph" role="tab" aria-selected="false" type="button">Diagram</button>
  </nav>

  <main class="workspace" data-mobile-pane="editor">
    <section class="pane pane--editor" aria-label="JSON editor">
      <div class="pane-head">
        <span class="pane-title">JSON</span>
        <span id="lineCount" class="pane-meta">0 lines</span>
      </div>
      <div class="editor-wrap">
        <div class="code-stack">
          <pre class="code-highlight" aria-hidden="true"><code id="highlight"></code></pre>
          <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off"
            autocorrect="off" wrap="soft" placeholder="Paste or type JSON here…"
            aria-label="JSON input"></textarea>
        </div>
        <div id="errorBar" class="error-bar" role="alert" hidden></div>
      </div>
    </section>

    <div class="divider" id="divider" role="separator" aria-orientation="vertical"
      aria-label="Resize panels" tabindex="0"
      aria-valuemin="15" aria-valuemax="60" aria-valuenow="25"></div>

    <section class="pane pane--graph" aria-label="Diagram">
      <div class="pane-head pane-head--graph">
        <span class="pane-title">Diagram</span>
        <span id="nodeCount" class="pane-meta">0 nodes</span>
      </div>

      <div class="graph-toolbar">
        <button class="btn btn--icon" id="zoomOut" type="button" title="Zoom out" aria-label="Zoom out">−</button>
        <span class="zoom-label" id="zoomLabel">100%</span>
        <button class="btn btn--icon" id="zoomIn" type="button" title="Zoom in" aria-label="Zoom in">+</button>
        <div class="sep sep--v" aria-hidden="true"></div>
        <button class="btn btn--icon" id="fit" type="button" title="Fit to screen" aria-label="Fit to screen">⤢</button>
      </div>

      <div class="canvas" id="canvas">
        <svg id="graph" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">◈</div>
          <p>Your diagram will appear here.</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
